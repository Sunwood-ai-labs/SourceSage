name: Release to X

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name, for example v0.1.0 - Initial release"
        required: true
        type: string
      release_url:
        description: "Release URL"
        required: true
        type: string
      release_notes:
        description: "Release notes to post or summarize"
        required: false
        type: string
      enable_summarization:
        description: "Summarize release notes with AI before posting"
        type: boolean
        default: false

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone release-note-x repository
        run: git clone https://github.com/Sunwood-ai-labs/release-note-x.git /tmp/release-note-x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: /tmp/release-note-x
        run: npm install

      - name: Post release to X
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_NAME="${{ inputs.release_name }}"
            RELEASE_URL="${{ inputs.release_url }}"
            RELEASE_NOTES="${{ inputs.release_notes }}"
            ENABLE_SUMMARY="${{ inputs.enable_summarization == true && 'true' || 'false' }}"
          else
            RELEASE_NAME="${{ github.event.release.name }}"
            RELEASE_URL="${{ github.event.release.html_url }}"
            RELEASE_NOTES="${{ github.event.release.body }}"
            ENABLE_SUMMARY="false"
          fi

          printf "%s" "$RELEASE_NOTES" > /tmp/release_notes.txt

          if [ "$ENABLE_SUMMARY" = "true" ] && [ -s /tmp/release_notes.txt ]; then
            SUMMARY=$(node /tmp/release-note-x/scripts/ai-summarize.js --quiet --file /tmp/release_notes.txt 2>/dev/null)
            if [ -z "$SUMMARY" ]; then
              SUMMARY="$RELEASE_NAME"
            fi
            node /tmp/release-note-x/scripts/post-x.js "$SUMMARY" "$RELEASE_URL"
          else
            node /tmp/release-note-x/scripts/post-release.js "$RELEASE_NAME" "$RELEASE_URL"
          fi

          rm -f /tmp/release_notes.txt
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL != '' && secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
